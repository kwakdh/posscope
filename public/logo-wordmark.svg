  </defs>

  <!-- crosshair target -->
  <circle cx="40" cy="32" r="18" stroke="#2196F3" stroke-width="3.5"/>
  <circle cx="40" cy="32" r="9" stroke="#90CAF9" stroke-width="3.5"/>
  <circle cx="40" cy="32" r="2.2" fill="#2196F3"/>
  <line x1="40" y1="8" x2="40" y2="16" stroke="#2196F3" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="40" y1="48" x2="40" y2="56" stroke="#2196F3" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="16" y1="32" x2="24" y2="32" stroke="#2196F3" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="56" y1="32" x2="64" y2="32" stroke="#2196F3" stroke-width="3.5" stroke-linecap="round"/>

  <!-- blob mascot -->
  <path d="M10 26
           C10 17 16 11 23 11
           C30 11 36 17 36 26
           C36 30 34 33 32 35
           C30 38 28 34 26 36
           C24 38 22 34 20 36
           C18 38 16 34 14 36
           C12 33 10 30 10 26 Z" fill="#8FE3D3"/>
