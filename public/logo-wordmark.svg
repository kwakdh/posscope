  <circle cx="28" cy="24" r="2" fill="#2D2D2D"/>
  <!-- blush -->
  <circle cx="15" cy="28" r="2.2" fill="#FFB6C1" opacity="0.8"/>
  <circle cx="31" cy="28" r="2.2" fill="#FFB6C1" opacity="0.8"/>

  <!-- telescope -->
  <rect x="28" y="20" width="20" height="6" rx="3" fill="#2196F3" transform="rotate(38 28 23)"/>
  <rect x="28" y="20" width="6" height="6" rx="3" fill="#1976D2" transform="rotate(38 28 23)"/>

  <!-- wordmark -->
  <text x="86" y="42" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="800" letter-spacing="2" fill="url(#posscopeGradient)">POSSCOPE</text>
  <text x="87" y="60" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5" fill="#5B6472">KCP POS MANAGEMENT &amp; OVERVIEW</text>
