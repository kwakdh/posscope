<svg width="360" height="72" viewBox="0 0 360 72" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="posscopeGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2196F3"/>
      <stop offset="1" stop-color="#4FC3F7"/>
